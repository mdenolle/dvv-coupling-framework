# Nepal Himalaya post-earthquake preset (Illien et al. 2022)
site:
  name: "Nepal (post-earthquake)"
  Vs: 1500.0          # m/s (average shallow crust)
  Vp: 2600.0          # m/s, Vp/Vs ~ 1.73 -> kappa_u = 9.02 GPa
  rho: 2400.0         # kg/m^3
  mu_prime: 150.0     # moderate fractured rock
  beta: -125.3        # bridge value at kappa_u
  beta_source: "bridge"
  regime: "undrained"
  alpha_B: 0.8
  B_skemp: 0.5
  perm: 1.0e-14       # m^2 (pre-earthquake)
  phi: 0.10
  depth: 300.0
  kappa_T: 0.8e-6
  alpha_T: 7.0e-6
analysis:
  frequency_hz: 3.0
  rule: "third_wavelength"
description: >
  Post-Gorkha-earthquake recovery context for damage-permeability
  feedback (Tier 2) in fractured Himalayan crust.
reference: "Illien et al. (2022)"
