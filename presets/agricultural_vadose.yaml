# Agricultural vadose-zone preset (Shi et al. 2026)
site:
  name: "Agricultural soil"
  Vs: 200.0           # m/s (near-surface soil)
  Vp: 450.0           # m/s, low (air in pores) -> kappa_u = 0.239 GPa
  rho: 1600.0         # kg/m^3
  mu_prime: 2000.0    # very high for unconsolidated soil
  beta: -3730.0       # bridge value at kappa_u
  beta_source: "bridge"
  regime: "undrained"
  alpha_B: 0.99       # nearly 1 for soil
  B_skemp: 0.90
  perm: 1.0e-11       # m^2 (sandy soil)
  phi: 0.45
  depth: 5.0          # very shallow
  kappa_T: 0.3e-6
  alpha_T: 10.0e-6
analysis:
  frequency_hz: 8.0
  rule: "third_wavelength"
  omega_forcing: 7.2722e-5   # daily forcing (rad/s) dominates shallow soil
description: >
  Shallow vadose zone: saturation-dependent nonlinear elasticity (Tier 3)
  with strong seasonal-to-daily moisture forcing.
reference: "Shi et al. (2026)"
